<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <style>
      .t{font: 20px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill:#111}
      .s{font: 16px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill:#111}
      .m{font: 14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; fill:#333}
      .box{fill:#fff;stroke:#333;stroke-width:2;rx:14;ry:14}
      .soft{fill:#f7f7f7;stroke:#777;stroke-width:1.5;rx:12;ry:12}
      .arrow{stroke:#333;stroke-width:2.5;fill:none;marker-end:url(#a)}
      .dash{stroke:#777;stroke-width:2;stroke-dasharray:8 7;fill:none}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#fff"/>

  <text class="t" x="40" y="54">ESLint v9 Flat Config 查找顺序 &amp; 类型感知 Linting（Typed Linting）</text>
  <text class="m" x="40" y="86">示意：ESLint 从“最近的 eslint.config.*”向上查找；typed linting 需要选择正确的 tsconfig 边界或使用 Project Service。</text>

  <rect class="box" x="60" y="130" width="520" height="430"/>
  <text class="s" x="85" y="170">1）Flat Config：配置向上查找</text>

  <rect class="soft" x="100" y="205" width="440" height="70"/>
  <text class="m" x="125" y="235">被 lint 的文件</text>
  <text class="m" x="125" y="258">例如：apps/vue3-app/src/views/Foo.vue</text>

  <path class="arrow" d="M 320 280 L 320 320"/>
  <rect class="soft" x="100" y="320" width="440" height="70"/>
  <text class="m" x="125" y="350">查找 apps/vue3-app/eslint.config.js</text>
  <text class="m" x="125" y="373">存在则使用；并可覆盖/扩展父级配置</text>

  <path class="arrow" d="M 320 395 L 320 435"/>
  <rect class="soft" x="100" y="435" width="440" height="85"/>
  <text class="m" x="125" y="465">不存在则继续向上：</text>
  <text class="m" x="145" y="488">packages/* → apps/* → 仓库根目录 eslint.config.js</text>
  <text class="m" x="145" y="511">（直到找到或到达根目录）</text>

  <rect class="box" x="640" y="130" width="500" height="430"/>
  <text class="s" x="665" y="170">2）Typed Linting：两种接入方式</text>

  <rect class="soft" x="680" y="205" width="420" height="135"/>
  <text class="m" x="705" y="235">A. parserOptions.project（传统方式）</text>
  <text class="m" x="705" y="260">- 指向一个或多个 tsconfig（可用 globs）</text>
  <text class="m" x="705" y="285">- 每个文件匹配到第一个 tsconfig 作为类型上下文</text>
  <text class="m" x="705" y="310">- globs 过宽（**）可能拖慢性能</text>

  <path class="dash" d="M 680 355 L 1100 355"/>

  <rect class="soft" x="680" y="380" width="420" height="160"/>
  <text class="m" x="705" y="410">B. parserOptions.projectService（v8+ 推荐）</text>
  <text class="m" x="705" y="435">- 自动发现就近 tsconfig，减少手工维护</text>
  <text class="m" x="705" y="460">- 与编辑器类型检查逻辑更一致</text>
  <text class="m" x="705" y="485">- 仍依赖“子项目 tsconfig 边界清晰”</text>
  <text class="m" x="705" y="510">  （包含生成文件：auto-imports.d.ts / SFC 等）</text>
</svg>
